workflows:
  android-workflow:
    name: Build Android APK
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - android_release
    scripts:
      - name: Install dependencies
        script: flutter pub get
      
      - name: Build APK
        script: flutter build apk --release
        
    artifacts:
      - build/**/outputs/**/*.apk
